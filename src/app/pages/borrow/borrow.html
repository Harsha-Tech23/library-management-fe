<div class="container">

<h2>Borrowed Books</h2>

<table>

<tr>
<th>Borrow ID</th>
<th>Book ID</th>
<th>Book Name</th>
<th>Author</th>
<th>ISBN</th>
<th>Action</th>
</tr>

<tr *ngFor="let b of borrows">

<td>{{b.id}}</td>
<td>{{b.bookId}}</td>
<td>{{b.bookName}}</td>
<td>{{b.bookAuthor}}</td>
<td>{{b.isbn}}</td>

<td>

<button (click)="returnBook(b.id)">
Return
</button>

</td>

</tr>

</table>

</div>
